name: Events Demo
on:
  pull_request:
    types:
      - opened
    branches:
      - main
      - 'dev-*'
      - 'feat/**' 
  workflow_dispatch:
  push:
    branches:
      - main
      - 'dev-*'
      - 'feat/**'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Output events data
        run: echo "${{ toJson(github.event)}}"
      - name: Get code
        uses: actions/checkout@v6
      - name: Install dependencies 
        run: npm ci
      - name: Test code
        run: npm run test
      - name: Build code
        run: npm run build
      - name: Deploy
        run: echo "Deploying..."                           

